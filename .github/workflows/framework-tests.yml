name: API Test Framework CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      test_scope:
        description: "Pytest scope to run"
        required: true
        default: "dummyjson_smoke"
        type: choice
        options:
          - framework_unit_test
          - dummyjson
          - dummyjson_smoke
      parallel:
        description: "Run pytest with xdist"
        required: true
        default: true
        type: boolean

env:
  DUMMYJSON_URL: "https://dummyjson.com"
  TEST_TIMEOUT: "10"
  TEST_RETRY_COUNT: "1"
  TEST_RETRY_BACKOFF_SECONDS: "0.5"
  TEST_ENV: "ci"
  LOG_LEVEL: "INFO"

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Check Python syntax
        run: python -m compileall -q src tests test_application

      - name: Run Ruff
        run: python -m ruff check .

      - name: Run pytest
        env:
          TEST_SCOPE: ${{ github.event.inputs.test_scope || 'ci_default' }}
          PARALLEL: ${{ github.event.inputs.parallel || 'true' }}
        run: |
          REPORT_ARGS="--html=reports/pytest-report.html --self-contained-html --alluredir=reports/allure-results --junitxml=reports/junit.xml"

          case "$TEST_SCOPE" in
            ci_default)
              PYTEST_MARKER="framework_unit_test or dummyjson_smoke"
              ;;
            framework_unit_test)
              PYTEST_MARKER="framework_unit_test"
              ;;
            dummyjson)
              PYTEST_MARKER="dummyjson"
              ;;
            dummyjson_smoke)
              PYTEST_MARKER="dummyjson_smoke"
              ;;
            *)
              echo "Unknown TEST_SCOPE: $TEST_SCOPE"
              exit 1
              ;;
          esac

          if [ "$PARALLEL" = "true" ]; then
            python -m pytest -m "$PYTEST_MARKER" -n auto $REPORT_ARGS
          else
            python -m pytest -m "$PYTEST_MARKER" $REPORT_ARGS
          fi

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-python-${{ matrix.python-version }}
          path: reports/
